<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FURKAN DİCE</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; background-color: #1a1a1a; 
            color: white; font-family: 'Segoe UI', sans-serif; 
        }

        h1 { color: #00ffcc; font-size: 3em; text-shadow: 0 0 10px #00ffcc; margin-bottom: 30px; }
        
        .zar-container { display: flex; gap: 15px; margin-top: 30px; }
        
        .zar { 
            width: 80px; height: 80px; background: #333; 
            border: 2px solid #00ffcc; display: flex;
            justify-content: center; align-items: center;
            border-radius: 12px; font-weight: bold;
        }

        .donuyor { animation: spin 0.6s linear infinite; }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        button { 
            background: #00ffcc; border: none; padding: 15px 40px; 
            font-size: 20px; font-weight: bold; color: #1a1a1a; 
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #00ccaa; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>FURKAN DİCE</h1>
    
    <button onclick="oynat()">ÇEVİR</button>

    <div class="zar-container">
        <div class="zar" id="z1"></div>
        <div class="zar" id="z2"></div>
        <div class="zar" id="z3"></div>
        <div class="zar" id="z4"></div>
    </div>

    <script>
        function oynat() {
            const renkler = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
            const zarlar = document.querySelectorAll('.zar');
            
            zarlar.forEach(z => {
                z.classList.add('donuyor');
                z.style.backgroundColor = '#333'; // Çevirirken arka planı sıfırla
            });
            
            setTimeout(() => {
                zarlar.forEach(z => {
                    z.classList.remove('donuyor');
                    // Rastgele renk seç
                    let rastgeleRenk = renkler[Math.floor(Math.random() * renkler.length)];
                    z.style.backgroundColor = rastgeleRenk;
                });
            }, 600);
        }
    </script>
</body>
</html>
